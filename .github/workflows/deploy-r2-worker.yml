name: Deploy jcrt-files to R2 + Worker

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Upload all tracked asset files (images/archives/citations/docs)"
        required: false
        default: "true"
      prune_deletes:
        description: "Delete removed files from remote R2 (slower)"
        required: false
        default: "false"
  push:
    branches: [main, master]
    paths:
      - 'images/**'
      - 'archives/**'
      - 'citations/**'
      - 'docs/**'
      - 'src/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-r2-worker.yml'

concurrency:
  group: deploy-jcrt-files-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Upload changed/new files to R2 and deploy Worker
        env:
          CLOUDFLARE_API_TOKEN_PRIMARY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN_V2: ${{ secrets.CLOUDFLARE_API_TOKEN_V2 }}
          CLOUDFLARE_API_TOKEN_BACKUP: ${{ secrets.CLOUDFLARE_API_TOKEN_BACKUP }}
          CLOUDFLARE_API_TOKEN_R2_ACCOUNT: ${{ secrets.JCRT_R2_Account_Token }}
          CLOUDFLARE_API_TOKEN_R2_ACCOUNT_ALT: ${{ secrets.JCRT_R2_ACCOUNT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: jcrt-files
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          FORCE_FULL_SYNC: ${{ github.event.inputs.full_sync }}
          PRUNE_DELETES: ${{ github.event.inputs.prune_deletes }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          TARGETS=(images archives citations docs)
          ZERO="0000000000000000000000000000000000000000"

          pick_working_token() {
            local token_label="$1"
            local token_value="$2"
            if [[ -z "${token_value}" ]]; then
              return 1
            fi
            export CLOUDFLARE_API_TOKEN="${token_value}"
            if wrangler r2 bucket list >/tmp/r2-buckets.txt 2>/tmp/r2-preflight.err; then
              echo "Cloudflare auth preflight passed using ${token_label}."
              return 0
            fi
            return 1
          }

          echo "Preflight: listing remote R2 buckets..."
          if ! pick_working_token "CLOUDFLARE_API_TOKEN" "${CLOUDFLARE_API_TOKEN_PRIMARY:-}"; then
            echo "Primary Cloudflare token failed; trying CLOUDFLARE_API_TOKEN_V2."
            if ! pick_working_token "CLOUDFLARE_API_TOKEN_V2" "${CLOUDFLARE_API_TOKEN_V2:-}"; then
              echo "V2 token failed; trying backup token."
              if ! pick_working_token "CLOUDFLARE_API_TOKEN_BACKUP" "${CLOUDFLARE_API_TOKEN_BACKUP:-}"; then
                echo "Backup token failed; trying R2 account token."
                if ! pick_working_token "JCRT_R2_Account_Token" "${CLOUDFLARE_API_TOKEN_R2_ACCOUNT:-}"; then
                  echo "R2 account token failed; trying alternate R2 token name."
                  if ! pick_working_token "JCRT_R2_ACCOUNT_TOKEN" "${CLOUDFLARE_API_TOKEN_R2_ACCOUNT_ALT:-}"; then
                    echo "No working Cloudflare API token found."
                    if [[ -s /tmp/r2-preflight.err ]]; then
                      sed -n '1,120p' /tmp/r2-preflight.err
                    fi
                    exit 1
                  fi
                fi
              fi
            fi
          fi

          if ! grep -q "^name:.*${R2_BUCKET}$" /tmp/r2-buckets.txt; then
            echo "Configured R2 bucket not found in account: ${R2_BUCKET}"
            echo "Available buckets:"
            cat /tmp/r2-buckets.txt
            exit 1
          fi

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${FORCE_FULL_SYNC}" != "false" ]]; then
            echo "Manual full sync requested; uploading all tracked target files."
            mapfile -t CHANGED < <(git ls-files "${TARGETS[@]}" || true)
            mapfile -t DELETED < <(printf "")
          elif [[ "${BEFORE_SHA}" == "$ZERO" ]] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            mapfile -t CHANGED < <(git ls-files "${TARGETS[@]}" || true)
            mapfile -t DELETED < <(printf "")
          else
            mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMRT "$BEFORE_SHA" "$AFTER_SHA" -- "${TARGETS[@]}" || true)
            mapfile -t DELETED < <(git diff --name-only --diff-filter=D "$BEFORE_SHA" "$AFTER_SHA" -- "${TARGETS[@]}" || true)
          fi

          echo "Changed/new files: ${#CHANGED[@]}"
          echo "Deleted files: ${#DELETED[@]}"

          for file in "${CHANGED[@]}"; do
            [[ -f "$file" ]] || continue
            echo "PUT $file"
            ok=false
            for attempt in 1 2 3; do
              if wrangler r2 object put "$R2_BUCKET/$file" --file "$file" --remote; then
                ok=true
                break
              fi
              echo "PUT failed (attempt $attempt/3): $file"
              sleep $((attempt * 2))
            done
            if [[ "$ok" != "true" ]]; then
              echo "Giving up on upload: $file"
              exit 1
            fi
          done

          if [[ "${PRUNE_DELETES:-false}" == "true" ]]; then
            for file in "${DELETED[@]}"; do
              [[ -n "$file" ]] || continue
              echo "DELETE $file"
              wrangler r2 object delete "$R2_BUCKET/$file" --remote || true
            done
          else
            echo "Skipping delete prune (PRUNE_DELETES=${PRUNE_DELETES:-false})."
          fi

          echo "Deploying Worker using verified token..."
          wrangler deploy
